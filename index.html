    <script>
        const SUPABASE_URL = 'https://shybhyuhavuqpmxzoxaa.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__CJiDmKcAn3G5jndY-XK5Q_oosKmSQM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let telegramUser = null;
        if (window.Telegram && window.Telegram.WebApp) {
            const webApp = window.Telegram.WebApp;
            webApp.ready();
            telegramUser = webApp.initDataUnsafe.user;
            console.log('[Telegram] User detected:', telegramUser);
        }

        const log = (msg) => {
            const el = document.getElementById('sb-log');
            if (el) el.innerHTML = msg;
            console.log('[Supabase]', msg);
        };

        async function initializeIdentity() {
            if (!telegramUser) {
                log('No Telegram user found. Using Guest mode.');
                return;
            }

            log(`Welcome ${telegramUser.first_name}! Syncing profile...`);
            
            const { data, error } = await supabaseClient
                .from('profiles')
                .upsert({ 
                    id: telegramUser.id.toString(), 
                    username: telegramUser.username || telegramUser.first_name,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' });

            if (error) {
                log('Identity Sync Error: ' + error.message);
            } else {
                log('Identity Linked to Supabase ✅');
            }
        }

        // --- PlayFab Interception Bridge ---
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            if (url.includes('playfabapi.com')) {
                this._isPlayFab = true;
                this._playFabUrl = url;
            }
            return originalOpen.apply(this, arguments);
        };

        const originalSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function(body) {
            if (this._isPlayFab) {
                console.log('[PlayFab Intercept]', this._playFabUrl, body);
                
                // 1. Intercept Save (UpdateUserData)
                if (this._playFabUrl.includes('UpdateUserData')) {
                    handleSupabaseSave(body);
                }

                // 2. Intercept Load (GetUserData)
                if (this._playFabUrl.includes('GetUserData')) {
                    handleSupabaseLoad(this);
                    return;
                }

                // 3. Intercept Login (LoginWithCustomID, etc.)
                if (this._playFabUrl.includes('LoginWith')) {
                    log('Logging in via Telegram identity...');
                    const playFabId = telegramUser ? telegramUser.id.toString() : 'guest';
                    respondWithMock(this, { 
                        "code": 200, 
                        "status": "OK", 
                        "data": { 
                            "SessionTicket": "mock-ticket-" + Date.now(), 
                            "PlayFabId": playFabId
                        } 
                    });
                    return;
                }
            }
            return originalSend.apply(this, arguments);
        };

        async function handleSupabaseSave(payload) {
            if (!telegramUser) return;
            try {
                const data = JSON.parse(payload);
                log('Saving to Supabase...');
                const { error } = await supabaseClient
                    .from('game_saves')
                    .upsert({ 
                        user_id: telegramUser.id.toString(), 
                        save_data: data.Data,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'user_id' });
                if (!error) log('Progress Saved! ☁️');
            } catch (e) {
                console.error('[Supabase Save Error]', e);
            }
        }

        async function handleSupabaseLoad(xhr) {
            if (!telegramUser) {
                // If no telegram user, just let it fail or default
                respondWithMock(xhr, { "code": 200, "status": "OK", "data": { "Data": {} } });
                return;
            }

            log('Fetching cloud save...');
            const { data, error } = await supabaseClient
                .from('game_saves')
                .select('save_data')
                .eq('user_id', telegramUser.id.toString())
                .single();

            if (data && data.save_data) {
                log('Cloud Save Loaded! 🎰');
                // Convert Supabase format to PlayFab format
                const playFabData = {};
                for (const key in data.save_data) {
                    playFabData[key] = { Value: data.save_data[key], LastUpdated: new Date().toISOString() };
                }
                respondWithMock(xhr, { 
                    "code": 200, 
                    "status": "OK", 
                    "data": { "Data": playFabData } 
                });
            } else {
                log('No cloud save found. Starting fresh.');
                respondWithMock(xhr, { "code": 200, "status": "OK", "data": { "Data": {} } });
            }
        }

        function respondWithMock(xhr, responseData) {
            const responseText = JSON.stringify(responseData);
            // Define mock properties
            Object.defineProperty(xhr, 'status', { writable: true, value: 200 });
            Object.defineProperty(xhr, 'statusText', { writable: true, value: 'OK' });
            Object.defineProperty(xhr, 'readyState', { writable: true, value: 4 });
            Object.defineProperty(xhr, 'responseText', { writable: true, value: responseText });
            Object.defineProperty(xhr, 'response', { writable: true, value: responseText });

            // Trigger load events
            if (xhr.onreadystatechange) xhr.onreadystatechange();
            if (xhr.onload) xhr.onload();
        }

        initializeIdentity();
    </script>

    <!-- H5_MADKIDGAMES_DOMAIN_GUARD -->
    <script>
        (function() {
            const BRAND = 'MadKidGames';
            const WHITELIST_URL = './whitelisted.json';
            const GAME_ENUM = 'IDLE_MINER_TYCOON_GOLD_GAMES';
            const OFFICIAL_SITE = 'https://www.madkidgames.com';
            const REDIRECT_DELAY = 300000;

            // --------------------------------------------------
            // HELPERS
            // --------------------------------------------------
            function normalize(d) {
                return (d || '')
                    .toLowerCase()
                    .replace(/^www\\./, '')
                    .replace(/:\\d+$/, '');
            }

            function safe(fn) {
                try {
                    const v = fn();
                    return v ? normalize(v) : null;
                } catch {
                    return null;
                }
            }

            function getFlag(flags, key, def) {
                return flags && flags[key] !== undefined ? flags[key] : def;
            }

            let DEBUG = false;

            function dlog() {
                if (DEBUG) console.log.apply(console, arguments);
            }

            function dwarn() {
                if (DEBUG) console.warn.apply(console, arguments);
            }

            const selfHost = normalize(location.hostname);

            // --------------------------------------------------
            // JS DOMAIN DETECTION (UNCHANGED)
            // --------------------------------------------------
            const signals = [];

            signals.push(safe(() =>
                window.location.ancestorOrigins &&
                window.location.ancestorOrigins.length > 0 &&
                new URL(window.location.ancestorOrigins[0]).hostname
            ));

            signals.push(safe(() => window.top?.location?.hostname));
            signals.push(safe(() => window.parent?.location?.hostname));
            signals.push(safe(() => document.referrer && new URL(document.referrer).hostname));
            signals.push(safe(() => window.opener?.location?.hostname));

            try {
                const nav = performance.getEntriesByType('navigation')[0];
                if (nav?.name) {
                    signals.push(normalize(new URL(nav.name).hostname));
                }
            } catch {}

            signals.push(selfHost);

            const uniqueSignals = [...new Set(signals.filter(Boolean))];
            const foreignSignals = uniqueSignals.filter(d => d !== selfHost);
            const jsEmbeddingDomain = foreignSignals.length > 0 ? foreignSignals[0] : selfHost;

            // --------------------------------------------------
            // UNITY HANDSHAKE
            // --------------------------------------------------
            function waitForUnity(cb) {
                const t = setInterval(() => {
                    if (window.unityInstance && window.unityInstance.SendMessage) {
                        clearInterval(t);
                        cb();
                    }
                }, 100);
            }

            // --------------------------------------------------
            // WHITELIST CHECK (CHECK ALWAYS, ENFORCE OPTIONALLY)
            // --------------------------------------------------
            fetch(WHITELIST_URL + '?v=' + Date.now(), {
                    cache: 'no-store'
                })
                .then(r => r.json())
                .then(json => {
                    const flags = json.flags || {};

                    DEBUG = getFlag(flags, 'debug_logs', false);

                    const APPLY_ENFORCEMENT =
                        getFlag(flags, 'redirect_on_reject', false);

                    const CHECK_DOMAIN =
                        getFlag(flags, 'enforce_domain_check', true);

                    dlog('[H5] Domain guard initialized');
                    dlog('[H5] Game enum:', GAME_ENUM);
                    dlog('[H5] Self host:', selfHost);
                    dlog('[H5] Detected embedding domain:', jsEmbeddingDomain);
                    dlog('[H5] Flags:', flags);

                    const game = (json.whitelisted_games || []).find(
                        g => g.game_enum === GAME_ENUM
                    );

                    const allowedDomains =
                        (json.allowed_domains || []).map(normalize);

                    let allowed = true;

                    if (CHECK_DOMAIN) {
                        allowed = !!game &&
                            allowedDomains.includes(jsEmbeddingDomain);

                        dlog('[H5] Allowed domains:', allowedDomains);
                        dlog('[H5] Domain allowed:', allowed);
                    }

                    // --------------------------------------------------
                    // FINAL DECISION (LOGIC PRESERVED, ENFORCEMENT GATED)
                    // --------------------------------------------------
                    waitForUnity(() => {
                        if (allowed || !APPLY_ENFORCEMENT) {
                            dlog('[H5][' + BRAND + '] DOMAIN APPROVED');
                            unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainApproved');
                        } else {
                            dwarn('[H5][' + BRAND + '] DOMAIN REJECTED');
                            unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainRejected');

                            setTimeout(() => {
                                try {
                                    window.top.location.href =
                                        game?.original_game_url || OFFICIAL_SITE;
                                } catch {
                                    location.href = OFFICIAL_SITE;
                                }
                            }, REDIRECT_DELAY);
                        }
                    });
                })
                .catch(err => {
                    console.error('[H5] Whitelist fetch failed', err);

                    // Fail-open (never block by default)
                    waitForUnity(() => {
                        unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainApproved');
                    });
                });
        })();
    </script>

    <!-- INJECTED_BY: WebGLCanvasResizeInjectorLandscape (Now Portrait) -->
    <script>
        (function() {
            function resizeUnityCanvas() {
                const canvas = document.getElementById('unity-canvas');
                if (!canvas) return;

                const targetAspect = 9 / 16;
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                let newWidth, newHeight;

                if (windowWidth / windowHeight > targetAspect) {
                    // Window is wider than needed
                    newHeight = windowHeight;
                    newWidth = newHeight * targetAspect;
                } else {
                    // Window is taller than needed
                    newWidth = windowWidth;
                    newHeight = newWidth / targetAspect;
                }

                canvas.style.width = newWidth + 'px';
                canvas.style.height = newHeight + 'px';
                
                // Ensure container centers the canvas
                const container = document.getElementById('unity-container');
                if (container) {
                    container.style.display = 'flex';
                    container.style.justifyContent = 'center';
                    container.style.alignItems = 'center';
                    container.style.background = '#000';
                    container.style.width = '100vw';
                    container.style.height = '100vh';
                }
            }

            window.addEventListener('load', resizeUnityCanvas);
            window.addEventListener('resize', resizeUnityCanvas);
            window.addEventListener('orientationchange', resizeUnityCanvas);
        })();
    </script>
